name: Auto Stock Scan

permissions:
  contents: write  # allow the workflow's GITHUB_TOKEN to push scan artifacts
  issues: write    # allow creating issues on failure

on:
  schedule:
    # OPTIMIZED SCAN SCHEDULE (2026-04-22)
    # Designed so each scan completes BEFORE its paired trade fires,
    # giving the auto-trader fresh data (<60 min old).
    # Scan duration: ~55 min (1000 tickers, Polygon free tier).

    # Morning scan — uses yesterday's close + overnight news.
    # Completes ~14:25 UTC; feeds the 14:30 UTC trade (10:30 ET).
    - cron: '30 13 * * 1-5'  # 13:30 UTC = 8:30 AM ET

    # Afternoon scan — uses morning intraday price action.
    # Completes ~18:25 UTC; feeds the 18:30 UTC trade (14:30 ET).
    - cron: '30 17 * * 1-5'  # 17:30 UTC = 13:30 ET (NEW — replaced 15:00 UTC redundant scan)

    # End-of-day scan — uses today's close for TOMORROW's planning.
    # No trade fires off this; it's purely for next-day candidate prep.
    - cron: '0 20 * * 1-5'   # 20:00 UTC = 16:00 ET

    # REMOVED:
    # - 15:00 UTC (10:00 ET) — redundant with 13:30 UTC scan (same data)
    # - 21:30 UTC (17:30 ET) — redundant with 20:00 UTC scan (both post-close)

  workflow_dispatch:  # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    # Raised from 90 — scan routinely takes 50–60 min; the 90-min cap
    # meant a slow scan got killed while the VPS pipeline still waited
    # 150 min for nothing. Aligns better with the pipeline's deadline.
    timeout-minutes: 120
    concurrency:
      # Namespace by event so a scheduled run doesn't cancel a manual
      # dispatch (and vice-versa). The pipeline timer dispatches at
      # 13:30/17:30 UTC and the cron also fires at those times — under
      # the previous global `auto-scan` group, the second one cancelled
      # the first, sometimes leaving the VPS pipeline polling 150 min
      # for a workflow that was killed seconds in. (Audit finding #6.)
      group: auto-scan-${{ github.event_name }}
      cancel-in-progress: true
    env:
      PYTHONPATH: ${{ github.workspace }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
      SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
      NASDAQ_API_KEY: ${{ secrets.NASDAQ_API_KEY }}
      MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
      TRADE_TELEGRAM_TOKEN: ${{ secrets.TRADE_TELEGRAM_TOKEN }}
      TRADE_TELEGRAM_CHAT_ID: ${{ secrets.TRADE_TELEGRAM_CHAT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if market is open
        id: market_check
        run: |
          # Simple holiday check (expand this list as needed)
          TODAY=$(date +%Y-%m-%d)
          HOLIDAYS="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-07-03 2026-09-07 2026-11-26 2026-12-25"

          if echo "$HOLIDAYS" | grep -q "$TODAY"; then
            echo "market_closed=true" >> $GITHUB_OUTPUT
            echo "Today is a US market holiday - skipping scan"
          else
            echo "market_closed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        if: steps.market_check.outputs.market_closed != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Verify API keys are set
        if: steps.market_check.outputs.market_closed != 'true'
        run: |
          if [ -z "$FMP_API_KEY" ]; then
            echo "⚠️ Warning: FMP_API_KEY not set"
          fi
          if [ -z "$POLYGON_API_KEY" ]; then
            echo "⚠️ Warning: POLYGON_API_KEY not set"
          fi

      - name: Install dependencies
        if: steps.market_check.outputs.market_closed != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare directories
        if: steps.market_check.outputs.market_closed != 'true'
        run: |
          mkdir -p data/scans
          mkdir -p logs

      - name: Run full scan
        if: steps.market_check.outputs.market_closed != 'true'
        id: scan
        run: |
          # NOTE: The GH Actions auto-trade dry-run (AUTO_TRADE_ENABLED=1)
          # was previously triggered on the 15:00 UTC scan. Since the VPS
          # now runs REAL auto-trading at 14:30 UTC (and 18:30 UTC) with
          # live Telegram notifications, the dry-run is redundant. The VPS
          # pulls this scan file via `git merge origin/main` before trading.
          python scripts/run_full_scan.py
        continue-on-error: true

      - name: Send alert on failure
        if: failure() && env.ALERT_WEBHOOK_URL != ''
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          curl -X POST "$ALERT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "workflow": "auto_scan",
              "status": "failed",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Scan integrity check (BLOCKS commit if scan output is broken)
        if: steps.market_check.outputs.market_closed != 'true' && steps.scan.outcome == 'success'
        run: python -m scripts.scan_integrity_check
        # NOT continue-on-error: if the scan output is broken, we WANT this
        # workflow to fail rather than push a bad parquet to origin/main.
        # On 2026-04-27 we pushed an empty parquet that broke the VPS pipeline
        # for 4 days. This step prevents that.

      - name: Update outcome tracking
        if: steps.market_check.outputs.market_closed != 'true'
        run: python scripts/update_outcomes.py
        continue-on-error: true

      - name: Commit and push updated scan artifacts
        if: steps.market_check.outputs.market_closed != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scans/ reports/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto scan results $(date +%Y-%m-%d) [skip ci]"
            # Retry push up to 3 times to handle concurrent pushes from other workflows
            for attempt in 1 2 3; do
              if git push origin main; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push failed (attempt $attempt/3) — rebasing and retrying..."
              git stash --include-untracked || true
              git pull --rebase origin main
              git stash pop || true
              # Re-add any files that may have been unstaged during rebase
              git add data/scans/ reports/ || true
              if ! git diff --cached --quiet; then
                # Re-run integrity check AFTER rebase: if the stash pop
                # introduced conflict markers in latest_scan.json (this
                # actually happened — git inserts <<<<<<< even on stash
                # pop conflicts), we must NOT amend+push the corrupted
                # file. (Audit finding #2 — pipeline.)
                if ! python -m scripts.scan_integrity_check; then
                  echo "POST-REBASE INTEGRITY FAIL — refusing to amend+push corrupted scan"
                  exit 1
                fi
                git commit --amend --no-edit
              fi
            done
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Automated Scan Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Scan Failure Alert

            **Workflow:** ${context.workflow}
            **Run ID:** ${context.runId}
            **Triggered by:** ${context.eventName}
            **Time:** ${new Date().toISOString()}

            ### Details
            - [View failed run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            ### Possible causes
            - API rate limits exceeded
            - Network connectivity issues
            - Data source unavailable
            - Code regression

            Please investigate and resolve.

            ---
            *This issue was automatically created by GitHub Actions.*`;

            // Check for existing open issues with same title prefix
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scan-failure'
            });

            const existingIssue = issues.data.find(i => i.title.startsWith('🚨 Automated Scan Failed'));

            if (existingIssue) {
              // Add comment to existing issue instead of creating duplicate
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### Additional failure at ${new Date().toISOString()}\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
              console.log(`Added comment to existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['scan-failure', 'automated']
              });
              console.log('Created new failure issue');
            }
