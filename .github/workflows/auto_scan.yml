name: Auto Stock Scan

permissions:
  contents: write  # allow the workflow's GITHUB_TOKEN to push scan artifacts
  issues: write    # allow creating issues on failure

on:
  schedule:
    # Pre-market scan (1 hour before NYSE open at 9:30 AM ET)
    - cron: '30 13 * * 1-5'  # 13:30 UTC = 8:30 AM ET ✓

    # Early session scan (30 min after open)
    - cron: '0 15 * * 1-5'   # 15:00 UTC = 10:00 AM ET ✓

    # Late session scan (1 hour before close at 4:00 PM ET)
    - cron: '0 20 * * 1-5'   # 20:00 UTC = 3:00 PM ET ✓

    # End of day scan (30 min after close)
    - cron: '30 21 * * 1-5'  # 21:30 UTC = 4:30 PM ET ✓

  workflow_dispatch:  # Allow manual trigger

# Prevent concurrent scans — cancel any in-progress run when a new one starts
concurrency:
  group: auto-scan
  cancel-in-progress: false  # Let current scan finish; queue at most one follow-up

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
      ALERT_WEBHOOK: ${{ secrets.ALERT_WEBHOOK }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check if market is open
        id: market_check
        run: |
          python - <<'PYEOF'
          import sys
          try:
              import pandas_market_calendars as mcal
              nyse = mcal.get_calendar('NYSE')
              from datetime import date
              today = date.today().strftime('%Y-%m-%d')
              schedule = nyse.schedule(start_date=today, end_date=today)
              if schedule.empty:
                  print(f"market_closed=true", file=open('/dev/stdout', 'w'))
                  with open('/tmp/market_status.txt', 'w') as f:
                      f.write('closed')
                  print(f"Today ({today}) is a NYSE holiday or weekend — skipping scan")
              else:
                  print(f"Market is open on {today}")
                  with open('/tmp/market_status.txt', 'w') as f:
                      f.write('open')
          except Exception as e:
              print(f"Calendar check failed ({e}), assuming market is open")
              with open('/tmp/market_status.txt', 'w') as f:
                  f.write('open')
          PYEOF
          STATUS=$(cat /tmp/market_status.txt 2>/dev/null || echo open)
          echo "market_closed=$([ "$STATUS" = "closed" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Verify API keys are set
        if: steps.market_check.outputs.market_closed != 'true'
        run: |
          if [ -z "$FMP_API_KEY" ]; then
            echo "⚠️ Warning: FMP_API_KEY not set"
          fi
          if [ -z "$POLYGON_API_KEY" ]; then
            echo "⚠️ Warning: POLYGON_API_KEY not set"
          fi

      - name: Prepare directories
        if: steps.market_check.outputs.market_closed != 'true'
        run: |
          mkdir -p data/scans
          mkdir -p logs

      - name: Run full scan
        if: steps.market_check.outputs.market_closed != 'true'
        id: scan
        run: |
          python scripts/run_full_scan.py
        continue-on-error: true

      - name: Send alert on failure
        if: failure() && env.ALERT_WEBHOOK_URL != ''
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          curl -X POST "$ALERT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "workflow": "auto_scan",
              "status": "failed",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Commit and push updated scan artifacts
        if: steps.market_check.outputs.market_closed != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scans/ reports/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto scan results $(date +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Automated Scan Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Scan Failure Alert

            **Workflow:** ${context.workflow}
            **Run ID:** ${context.runId}
            **Triggered by:** ${context.eventName}
            **Time:** ${new Date().toISOString()}

            ### Details
            - [View failed run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            ### Possible causes
            - API rate limits exceeded
            - Network connectivity issues
            - Data source unavailable
            - Code regression

            Please investigate and resolve.

            ---
            *This issue was automatically created by GitHub Actions.*`;

            // Check for existing open issues with same title prefix
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scan-failure'
            });

            const existingIssue = issues.data.find(i => i.title.startsWith('🚨 Automated Scan Failed'));

            if (existingIssue) {
              // Add comment to existing issue instead of creating duplicate
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### Additional failure at ${new Date().toISOString()}\n\n[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
              console.log(`Added comment to existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['scan-failure', 'automated']
              });
              console.log('Created new failure issue');
            }
