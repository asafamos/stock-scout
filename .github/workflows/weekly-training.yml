name: Weekly ML Training (20d)

# Retrains ML model weekly with 2000 tickers × 5 years history from Polygon API.
# Uses feature registry v3.1 (39 features) + PurgedWalkForwardCV (no leakage).

permissions:
  contents: write  # allow committing trained model back to repo

on:
  schedule:
    # Weekly on Sunday at 22:00 UTC (before Monday market open)
    - cron: '0 22 * * 0'
  workflow_dispatch: {}  # Manual trigger for testing

# Only one training run at a time; new dispatch waits for current to finish
concurrency:
  group: weekly-training
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # Training 2000 tickers with 5 years of data needs time
    env:
      # REQUIRED: Polygon API key for historical data
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      # Optional: Additional providers for fallback/enrichment
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
      SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
      MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
      NASDAQ_API_KEY: ${{ secrets.NASDAQ_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug - List available API keys
        run: |
          echo "=== API Keys Status ==="
          echo "POLYGON_API_KEY: ${POLYGON_API_KEY:+SET (${#POLYGON_API_KEY} chars)}${POLYGON_API_KEY:-NOT SET}"
          echo "FMP_API_KEY: ${FMP_API_KEY:+SET}${FMP_API_KEY:-NOT SET}"
          echo "FINNHUB_API_KEY: ${FINNHUB_API_KEY:+SET}${FINNHUB_API_KEY:-NOT SET}"
          echo "ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:+SET}${ALPHA_VANTAGE_API_KEY:-NOT SET}"
          echo "TIINGO_API_KEY: ${TIINGO_API_KEY:+SET}${TIINGO_API_KEY:-NOT SET}"
          echo "EODHD_API_KEY: ${EODHD_API_KEY:+SET}${EODHD_API_KEY:-NOT SET}"
          echo "======================="

      - name: Verify API keys
        run: |
          if [ -z "$POLYGON_API_KEY" ]; then
            echo "❌ ERROR: POLYGON_API_KEY secret is required but not set"
            echo ""
            echo "Please add POLYGON_API_KEY to your repository secrets:"
            echo "1. Go to Settings → Secrets and variables → Actions"
            echo "2. Click 'New repository secret'"
            echo "3. Name: POLYGON_API_KEY"
            echo "4. Value: Your Polygon.io API key"
            exit 1
          fi
          echo "✅ POLYGON_API_KEY is set (${#POLYGON_API_KEY} characters)"

      - name: Run rolling training
        env:
          # Training configuration (informational - actual values in Python code)
          UNIVERSE_SIZE: '2000'
          LOOKBACK_YEARS: '5'
          RELATIVE_LABEL_TAU: '0.03'
          ROLLING_MONTHS: '18'
          TS_SPLITS: '5'
          PRECISION_AT_K: '20'
        run: |
          echo "=== Starting ML Training ==="
          echo "  Universe: $UNIVERSE_SIZE tickers"
          echo "  Lookback: $LOOKBACK_YEARS years"
          echo "  Rolling months: $ROLLING_MONTHS"
          echo "============================="
          python -m scripts.run_daily_training

      - name: Model quality gate (Precision@20 ≥ 40%)
        run: |
          python - <<'PYEOF'
          import json, sys, glob, os
          from pathlib import Path

          reports = sorted(
              glob.glob("reports/rolling_train_report_*.json"),
              key=lambda p: Path(p).stat().st_mtime,
              reverse=True,
          )
          if not reports:
              # Also check metadata from latest bundle
              meta_path = Path("ml/bundles/latest/metadata.json")
              if meta_path.exists():
                  with open(meta_path) as f:
                      meta = json.load(f)
                  p20 = meta.get("evaluation", {}).get("precision_at_20", 0.0)
              else:
                  print("⚠️  No training report found — skipping quality gate (first run)")
                  sys.exit(0)
          else:
              with open(reports[0]) as f:
                  report = json.load(f)
              p20 = report.get("precision_at_20") or report.get("metrics", {}).get("precision_at_20", 0.0)

          min_p20 = float(os.getenv("MIN_PRECISION_AT_20", "0.40"))
          print(f"Precision@20: {p20:.3f}  (threshold: {min_p20:.3f})")
          if p20 < min_p20:
              print(f"❌ Model quality gate FAILED — P@20={p20:.3f} < {min_p20:.3f}")
              sys.exit(1)
          else:
              print(f"✅ Model quality gate PASSED")
          PYEOF
        env:
          MIN_PRECISION_AT_20: '0.40'

      - name: Monitor Drift (PSI/KS)
        continue-on-error: true
        run: |
          python -m scripts.monitor_drift || true

      - name: Upload model bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-bundle-v3.1-${{ github.run_number }}
          path: |
            models/model_20d_v3.pkl
            models/model_20d_v3_*.pkl
            models/*.metadata.json
            ml/bundles/latest/model.joblib
            ml/bundles/latest/metadata.json
            reports/rolling_train_report_*.json
          retention-days: 90

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: reports/drift_report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit and push updated model bundle
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage canonical model, timestamped bundles, metadata, and latest bundle
          git add models/model_20d_v3.pkl models/model_20d_v3_*.pkl models/*.metadata.json || true
          git add ml/bundles/latest/model.joblib ml/bundles/latest/metadata.json || true
          git add reports/rolling_train_report_*.json || true
          if git diff --cached --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "chore(ml): weekly v3.1 training — $(date +%Y-%m-%d) [skip ci]"
            git push
          fi
