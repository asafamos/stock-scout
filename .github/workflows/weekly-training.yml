name: Nightly ML Training (20d)

# Nightly training workflow - retrains ML model with 1000 tickers and
# 3 years of history from Polygon API (free tier: 4 req/min).
# Runs on weeknights (Mon-Fri) after market close.
# Uses rank-based labeling (v3.6 features, 23 features).

permissions:
  contents: write  # allow committing trained model back to repo
  issues: write    # allow creating failure alert issues

on:
  schedule:
    # Nightly on weekdays at 22:00 UTC (after US market close)
    - cron: '0 22 * * 1-5'
  workflow_dispatch: {}  # Manual trigger for testing

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 1000 tickers × 4 req/min ≈ 250 min data + training ≈ 60 min = ~310 min
    env:
      # REQUIRED: Polygon API key for historical data
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      # Optional: Additional providers for fallback/enrichment
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
      SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
      MARKETSTACK_API_KEY: ${{ secrets.MARKETSTACK_API_KEY }}
      NASDAQ_API_KEY: ${{ secrets.NASDAQ_API_KEY }}
      # ML configuration
      ML_TARGET_MODE: 'rank'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git push

      - name: Check if market is open (skip holidays)
        id: market_check
        run: |
          TODAY=$(date +%Y-%m-%d)
          # US market holidays for 2026 (update annually)
          HOLIDAYS="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-07-03 2026-09-07 2026-11-26 2026-12-25"
          if echo "$HOLIDAYS" | grep -q "$TODAY"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ Today ($TODAY) is a US market holiday — skipping training"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ Market was open today ($TODAY) — proceeding with training"
          fi

      - name: Setup Python
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.market_check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Polygon data
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: data/polygon_cache
          key: polygon-data-${{ hashFiles('scripts/train_rolling_ml_20d.py') }}-${{ github.run_id }}
          restore-keys: |
            polygon-data-${{ hashFiles('scripts/train_rolling_ml_20d.py') }}-
            polygon-data-

      - name: Debug - List available API keys
        if: steps.market_check.outputs.skip != 'true'
        run: |
          echo "=== API Keys Status ==="
          echo "POLYGON_API_KEY: ${POLYGON_API_KEY:+SET (${#POLYGON_API_KEY} chars)}${POLYGON_API_KEY:-NOT SET}"
          echo "FMP_API_KEY: ${FMP_API_KEY:+SET}${FMP_API_KEY:-NOT SET}"
          echo "FINNHUB_API_KEY: ${FINNHUB_API_KEY:+SET}${FINNHUB_API_KEY:-NOT SET}"
          echo "ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:+SET}${ALPHA_VANTAGE_API_KEY:-NOT SET}"
          echo "TIINGO_API_KEY: ${TIINGO_API_KEY:+SET}${TIINGO_API_KEY:-NOT SET}"
          echo "EODHD_API_KEY: ${EODHD_API_KEY:+SET}${EODHD_API_KEY:-NOT SET}"
          echo "======================="

      - name: Verify API keys
        if: steps.market_check.outputs.skip != 'true'
        run: |
          if [ -z "$POLYGON_API_KEY" ]; then
            echo "❌ ERROR: POLYGON_API_KEY secret is required but not set"
            echo ""
            echo "Please add POLYGON_API_KEY to your repository secrets:"
            echo "1. Go to Settings → Secrets and variables → Actions"
            echo "2. Click 'New repository secret'"
            echo "3. Name: POLYGON_API_KEY"
            echo "4. Value: Your Polygon.io API key"
            exit 1
          fi
          echo "✅ POLYGON_API_KEY is set (${#POLYGON_API_KEY} characters)"

      - name: Run rolling training
        if: steps.market_check.outputs.skip != 'true'
        env:
          # Training configuration — must match variable names in train_rolling_ml_20d.py
          ML_UNIVERSE_SIZE: '1000'
          ML_TRAIN_YEARS: '3'
          POLYGON_RATE_LIMIT: '4'
          POLYGON_THREADS: '1'
        run: |
          echo "=== Starting ML Training ==="
          echo "  Universe: $ML_UNIVERSE_SIZE tickers"
          echo "  Lookback: $ML_TRAIN_YEARS years"
          echo "  Rate limit: $POLYGON_RATE_LIMIT req/min"
          echo "  Target mode: $ML_TARGET_MODE"
          echo "============================="
          python -m scripts.run_daily_training

      - name: Backtest Precision@K
        if: steps.market_check.outputs.skip != 'true'
        env:
          MIN_PRECISION_THRESHOLD: '0.55'
        continue-on-error: true  # Don't fail workflow if no test data available
        run: |
          # Validate model meets minimum precision threshold (if test data exists)
          if ls data/test_20d_v3_*.csv 1> /dev/null 2>&1; then
            python -m scripts.backtest_precision_at_k
            echo "✓ Model validation passed"
          else
            echo "⚠️ Skipping backtest - no test CSV found (first training run)"
          fi

      - name: Monitor Drift (PSI/KS)
        if: steps.market_check.outputs.skip != 'true'
        continue-on-error: true  # Optional step
        run: |
          python -m scripts.monitor_drift || true

      - name: Upload model bundle artifact
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ml-bundle-${{ github.run_number }}
          path: |
            models/model_20d_v3.pkl
            models/model_20d_v3_*.pkl
            ml/bundles/latest/
            reports/rolling_train_report_*.json

      - name: Upload training reports
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: training-reports-${{ github.run_number }}
          path: reports/

      - name: Commit and push updated model bundle
        if: steps.market_check.outputs.skip != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add model files (only those that exist)
          for f in models/model_20d_v3.pkl models/model_20d_v3.metadata.json models/feature_importance_report.txt; do
            [ -f "$f" ] && git add "$f"
          done
          # Add timestamped bundles if any
          git add models/model_20d_v3_*.pkl 2>/dev/null || true
          # Add latest bundle directory
          [ -d "ml/bundles/latest" ] && git add ml/bundles/latest/
          # Include training reports
          git add reports/rolling_train_report_*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "chore(ml): nightly training - update v3.6 model bundle (23 features, rank labels) [skip ci]"
            # Retry push up to 3 times to handle concurrent pushes
            for attempt in 1 2 3; do
              if git push origin main; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push failed (attempt $attempt/3) — pulling and retrying..."
              git pull --rebase origin main || true
            done
          fi

      # ── Failure alert: create GitHub issue so training failures are never silent ──
      - name: Create failure alert issue
        if: failure() && steps.market_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 ML Training Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `## ML Nightly Training Failed\n\n` +
                    `**Run:** [#${context.runNumber}](${runUrl})\n` +
                    `**Date:** ${new Date().toISOString()}\n` +
                    `**Trigger:** ${context.eventName}\n\n` +
                    `Please investigate the logs and re-run manually if needed.\n\n` +
                    `---\n*Auto-created by weekly-training.yml*`,
              labels: ['bug', 'ml-training'],
            });
