name: Track Outcomes

permissions:
  contents: write

on:
  schedule:
    # Run daily after market close (5:00 PM ET = 22:00 UTC)
    - cron: '0 22 * * 1-5'

  workflow_dispatch:
    inputs:
      as_of_date:
        description: 'Date for price lookups (YYYY-MM-DD). Default: today'
        required: false
        type: string

jobs:
  update-outcomes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update outcome tracking
        run: |
          if [ -n "${{ inputs.as_of_date }}" ]; then
            python scripts/update_outcomes.py --as-of "${{ inputs.as_of_date }}"
          else
            python scripts/update_outcomes.py
          fi

      - name: Commit updated DuckDB
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update outcome tracking $(date +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
