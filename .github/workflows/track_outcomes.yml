name: Track Outcomes

permissions:
  contents: write
  issues: write    # allow creating failure alert issues

on:
  schedule:
    # Run daily after market close (5:00 PM ET = 22:00 UTC)
    - cron: '0 22 * * 1-5'

  workflow_dispatch:
    inputs:
      as_of_date:
        description: 'Date for price lookups (YYYY-MM-DD). Default: today'
        required: false
        type: string

jobs:
  update-outcomes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: ${{ github.workspace }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if market was open (skip holidays)
        id: market_check
        run: |
          TODAY=$(date +%Y-%m-%d)
          HOLIDAYS="2026-01-01 2026-01-19 2026-02-16 2026-04-03 2026-05-25 2026-07-03 2026-09-07 2026-11-26 2026-12-25"
          if echo "$HOLIDAYS" | grep -q "$TODAY"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ Today ($TODAY) is a US market holiday — skipping outcome update"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python 3.11
        if: steps.market_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.market_check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update outcome tracking
        if: steps.market_check.outputs.skip != 'true'
        run: |
          if [ -n "${{ inputs.as_of_date }}" ]; then
            python scripts/update_outcomes.py --as-of "${{ inputs.as_of_date }}"
          else
            python scripts/update_outcomes.py
          fi

      - name: Commit updated DuckDB
        if: steps.market_check.outputs.skip != 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update outcome tracking $(date +%Y-%m-%d) [skip ci]"
            git pull --rebase origin main || true
            git push
          fi

      # Failure alert: create GitHub issue
      - name: Create failure alert issue
        if: failure() && steps.market_check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Outcome Tracking Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `## Outcome Tracking Update Failed\n\n` +
                    `**Run:** [#${context.runNumber}](${runUrl})\n` +
                    `**Date:** ${new Date().toISOString()}\n\n` +
                    `Please investigate the logs.\n\n` +
                    `---\n*Auto-created by track_outcomes.yml*`,
              labels: ['bug'],
            });
