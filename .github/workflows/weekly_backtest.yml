name: Weekly Backtest

permissions:
  contents: write
  issues: write

on:
  schedule:
    # Run every Sunday at 6:00 AM UTC
    - cron: '0 6 * * 0'

  workflow_dispatch:
    inputs:
      start_date:
        description: 'Backtest start date (YYYY-MM-DD)'
        required: false
        type: string
        default: '2025-06-01'
      end_date:
        description: 'Backtest end date (YYYY-MM-DD)'
        required: false
        type: string
        default: '2026-03-13'
      ablation:
        description: 'Run ablation study'
        required: false
        type: boolean
        default: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest
        id: backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          START="${{ inputs.start_date || '2025-06-01' }}"
          END="${{ inputs.end_date || '2026-03-13' }}"
          ABLATION_FLAG=""
          if [ "${{ inputs.ablation }}" = "true" ]; then
            ABLATION_FLAG="--ablation"
          fi
          python scripts/run_full_backtest.py \
            --start "$START" --end "$END" \
            --universe-size 200 \
            --output reports/backtest_latest.json \
            $ABLATION_FLAG

      - name: Commit backtest results
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly backtest results $(date +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Check Sharpe threshold
        run: |
          if [ -f reports/backtest_latest.json ]; then
            SHARPE=$(python3 -c "
          import json
          with open('reports/backtest_latest.json') as f:
              data = json.load(f)
          sharpe = data.get('sharpe', 0)
          print(f'{sharpe:.2f}')
          ")
            echo "Sharpe ratio: $SHARPE"
          fi
