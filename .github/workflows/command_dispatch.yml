name: Command Dispatch

# Triggered by Streamlit dashboard via repository_dispatch.
# Receives a command + payload and pushes it to a queue file in the
# `commands` branch. The VPS polls this branch and processes new commands
# (single source of truth — same pipeline regardless of caller).
#
# 2026-05-29: rewritten to use `env:` for ${{ }} expressions instead of
# embedding them inside single-quoted shell strings. The old pattern
# (--argjson payload '${{ toJSON(github.event.client_payload) }}') made
# GitHub's workflow parser refuse the entire file — appeared in the API
# with name = file path (not "Command Dispatch") and silently DROPPED every
# Streamlit-dispatched command since 2026-05-05. Diagnosed via
# `gh api .../actions/workflows` — broken workflows show name=path.

on:
  repository_dispatch:
    types: [stockscout-command]

permissions:
  contents: write

jobs:
  enqueue:
    # Defensive guard — only repository_dispatch reaches steps. Push events
    # to this file no longer trigger a run at all now that the file parses
    # cleanly (workflows without a push: trigger don't run on push).
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    env:
      # Pull expressions out of shell-quoted strings — official GitHub
      # pattern for complex/JSON expressions. Avoids the parser-rejection
      # trap above.
      CLIENT_CMD: ${{ github.event.client_payload.command }}
      CLIENT_PAYLOAD_JSON: ${{ toJSON(github.event.client_payload) }}
    steps:
      - name: Validate payload
        run: |
          if [ -z "$CLIENT_CMD" ]; then
            echo "::error::No command provided in client_payload"
            exit 1
          fi
          echo "Command: $CLIENT_CMD"

      - name: Checkout commands branch (or create empty)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          git config --global user.email "command-dispatch@stockscout"
          git config --global user.name "stockscout-command-dispatch"
          mkdir command_queue && cd command_queue
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
          if git fetch origin commands 2>/dev/null; then
            git checkout -B commands origin/commands
          else
            git checkout -b commands
          fi

      - name: Append command to queue
        run: |
          cd command_queue
          mkdir -p commands
          QF=commands/queue.jsonl
          touch "$QF"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ID=$(date -u +%s)-$RANDOM
          # CRITICAL: build the entry through jq with --compact-output so the
          # resulting JSON is a SINGLE LINE. The poller reads queue.jsonl
          # line-by-line and silently drops multi-line JSON entries.
          # CLIENT_PAYLOAD_JSON comes from env (not an inline expression in
          # this run block) so the Actions parser doesn't reject this file.
          jq -nc \
            --arg id "$ID" \
            --arg ts "$NOW" \
            --argjson payload "$CLIENT_PAYLOAD_JSON" \
            '{id: $id, ts: $ts, source: "streamlit-dispatch", payload: $payload, status: "pending"}' \
            >> "$QF"

      - name: Push command to commands branch
        run: |
          cd command_queue
          git add commands/queue.jsonl
          git commit -q -m "queue: $CLIENT_CMD"
          git push -q origin commands
