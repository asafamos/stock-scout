name: Command Dispatch

# Triggered by Streamlit dashboard via repository_dispatch.
# Receives a command + payload and pushes it to a queue file in the
# `commands` branch. The VPS polls this branch and processes new commands
# (single source of truth — same pipeline regardless of caller).

on:
  repository_dispatch:
    types: [stockscout-command]

permissions:
  contents: write

jobs:
  enqueue:
    # Defensive guard: only execute on the actual repository_dispatch
    # event. Without this, GitHub still occasionally emits "ghost" runs
    # on push events to non-default branches (observed 2026-05-01:
    # multiple "Run failed: No jobs were run" emails when the
    # claude/new-session-* branch was pushed). The job-level `if`
    # neutralizes those false alarms while keeping the real dispatch
    # path unchanged.
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate payload
        run: |
          CMD="${{ github.event.client_payload.command }}"
          if [ -z "$CMD" ]; then
            echo "::error::No command provided in client_payload"
            exit 1
          fi
          echo "Command: $CMD"

      - name: Checkout commands branch (or create empty)
        run: |
          git config --global user.email "command-dispatch@stockscout"
          git config --global user.name "stockscout-command-dispatch"
          mkdir command_queue && cd command_queue
          git init -q
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          if git fetch origin commands 2>/dev/null; then
            git checkout -B commands origin/commands
          else
            git checkout -b commands
          fi

      - name: Append command to queue
        run: |
          cd command_queue
          mkdir -p commands
          QF=commands/queue.jsonl
          touch "$QF"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ID=$(date -u +%s)-$RANDOM
          # CRITICAL: build the entry through jq with --compact-output so the
          # resulting JSON is a SINGLE LINE. Previous version used
          # ${{ toJSON(...) }} directly which emits pretty-printed JSON
          # (multi-line). The poller reads queue.jsonl line-by-line and
          # logged "malformed queue line: Expecting value" warnings on every
          # entry — silently dropping ALL Streamlit-dispatched commands.
          # Diagnosed 2026-05-01: a "pause" click reached the workflow
          # successfully, the queue was appended, but the poller couldn't
          # parse the multi-line JSON and skipped it forever.
          jq -nc \
            --arg id "$ID" \
            --arg ts "$NOW" \
            --argjson payload '${{ toJSON(github.event.client_payload) }}' \
            '{id: $id, ts: $ts, source: "streamlit-dispatch", payload: $payload, status: "pending"}' \
            >> "$QF"

      - name: Push command to commands branch
        run: |
          cd command_queue
          git add commands/queue.jsonl
          git commit -q -m "queue: ${{ github.event.client_payload.command }}"
          git push -q origin commands
