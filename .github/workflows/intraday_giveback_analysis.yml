name: Intraday Giveback Analysis (One-off)

# One-off analytical workflow: fetches 1-min intraday bars from FMP for every
# closed round-trip in data/trades/executions.jsonl, computes true peak vs
# realized giveback, uploads results as artifact.
#
# Motivation: user observed pattern over 6 months of positions hitting peak
# then giving back significant profit. Daily HIGH from yfinance suggests
# 4-11% giveback per trade ($417 total across 16 trades). This workflow
# verifies with 1-min intraday precision using our paid data source.

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      ledger_b64:
        description: 'Base64-encoded contents of data/trades/executions.jsonl (VPS-only file, not in repo)'
        required: true
        type: string
      note:
        description: 'Analysis note (optional)'
        required: false
        default: 'Peak-vs-realized giveback verification with FMP intraday'

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyarrow

      - name: Decode ledger input to file
        env:
          LEDGER_B64: ${{ inputs.ledger_b64 }}
        run: |
          mkdir -p data/trades
          echo "$LEDGER_B64" | base64 -d > data/trades/executions.jsonl
          echo "Ledger lines: $(wc -l < data/trades/executions.jsonl)"
          head -1 data/trades/executions.jsonl | cut -c1-120

      - name: Fetch 1-min bars for all closed round-trips
        run: |
          cat > /tmp/fetch_intraday.py << 'PYEOF'
          """Fetch 1-min bars from FMP for each closed round-trip.

          Output: /tmp/intraday_analysis.csv with columns:
            sym, entry_time, exit_time, entry_price, exit_price,
            realized_pnl_$, realized_gain_%,
            peak_price, peak_time, peak_gain_%,
            giveback_%, giveback_$, qty
          """
          import json
          import os
          import sys
          import time
          from collections import defaultdict
          from datetime import datetime, timedelta

          import pandas as pd
          import requests

          FMP_KEY = os.environ.get("FMP_API_KEY", "")
          POLY_KEY = os.environ.get("POLYGON_API_KEY", "")

          if not FMP_KEY and not POLY_KEY:
              print("ERROR: no FMP or Polygon key available")
              sys.exit(1)

          LEDGER = "data/trades/executions.jsonl"
          by_sym = defaultdict(list)
          with open(LEDGER) as f:
              for line in f:
                  try:
                      r = json.loads(line)
                      by_sym[r.get("ticker", "?")].append(r)
                  except Exception:
                      pass

          # Build round-trips
          closes = []
          for sym, fills in by_sym.items():
              fills.sort(key=lambda x: x.get("time", ""))
              net = 0.0
              entry_time = None
              entry_price_sum = 0.0
              entry_qty_sum = 0.0
              for f_ in fills:
                  side = f_.get("side", "")
                  qty = float(f_.get("shares", 0))
                  px = float(f_.get("price", 0))
                  t = f_.get("time", "")
                  rpnl = float(f_.get("realized_pnl", 0) or 0)
                  if side == "BUY":
                      if net < 0.001:
                          entry_time = t
                          entry_price_sum = 0.0
                          entry_qty_sum = 0.0
                      net += qty
                      entry_price_sum += px * qty
                      entry_qty_sum += qty
                  elif side == "SELL":
                      entry_avg = (entry_price_sum / entry_qty_sum) if entry_qty_sum else 0.0
                      gain_pct = ((px / entry_avg) - 1) * 100 if entry_avg else 0.0
                      closes.append({
                          "sym": sym,
                          "entry_time": entry_time or "?",
                          "exit_time": t,
                          "entry_price": entry_avg,
                          "exit_price": px,
                          "gain_pct": gain_pct,
                          "rpnl": rpnl,
                          "qty": qty,
                      })
                      net -= qty
                      if abs(net) <= 0.001:
                          net = 0.0
                          entry_time = None

          print(f"Round-trip closes to analyze: {len(closes)}")

          def fetch_fmp_1min(sym, start_date, end_date):
              """FMP historical-chart/1min. Free tier: 250 calls/day."""
              url = f"https://financialmodelingprep.com/api/v3/historical-chart/1min/{sym}"
              params = {"from": start_date, "to": end_date, "apikey": FMP_KEY}
              try:
                  r = requests.get(url, params=params, timeout=15)
                  if r.status_code != 200:
                      print(f"  FMP {sym} HTTP {r.status_code}")
                      return None
                  data = r.json()
                  if not data or (isinstance(data, dict) and "Error" in str(data)):
                      print(f"  FMP {sym} error: {str(data)[:100]}")
                      return None
                  df = pd.DataFrame(data)
                  if df.empty:
                      return None
                  df["date"] = pd.to_datetime(df["date"])
                  df = df.sort_values("date").reset_index(drop=True)
                  return df
              except Exception as e:
                  print(f"  FMP {sym} exc: {e}")
                  return None

          def fetch_poly_1min(sym, start_date, end_date):
              """Polygon aggs: 1-min bars. Free tier: 5/min, 2yr history."""
              url = f"https://api.polygon.io/v2/aggs/ticker/{sym}/range/1/minute/{start_date}/{end_date}"
              params = {"adjusted": "true", "sort": "asc", "limit": 50000, "apiKey": POLY_KEY}
              try:
                  r = requests.get(url, params=params, timeout=15)
                  if r.status_code != 200:
                      print(f"  Polygon {sym} HTTP {r.status_code}")
                      return None
                  data = r.json()
                  results = data.get("results", [])
                  if not results:
                      return None
                  df = pd.DataFrame(results)
                  df["date"] = pd.to_datetime(df["t"], unit="ms", utc=True)
                  df = df.rename(columns={"o": "open", "h": "high", "l": "low", "c": "close", "v": "volume"})
                  df = df.sort_values("date").reset_index(drop=True)
                  return df
              except Exception as e:
                  print(f"  Polygon {sym} exc: {e}")
                  return None

          rows = []
          for i, c in enumerate(closes):
              if c["entry_price"] <= 0 or not c["entry_time"] or c["entry_time"] == "?":
                  continue
              try:
                  entry_dt = datetime.fromisoformat(c["entry_time"].replace("Z", "+00:00"))
                  exit_dt = datetime.fromisoformat(c["exit_time"].replace("Z", "+00:00"))
              except Exception as e:
                  print(f"[{i}] {c['sym']} time parse err: {e}")
                  continue
              start_date = (entry_dt - timedelta(days=1)).strftime("%Y-%m-%d")
              end_date = (exit_dt + timedelta(days=1)).strftime("%Y-%m-%d")
              sym = c["sym"]
              print(f"[{i+1}/{len(closes)}] {sym} {start_date}→{end_date} (hold {(exit_dt-entry_dt).days}d)")

              # Try FMP first, fall back to Polygon
              df = None
              source = "none"
              if FMP_KEY:
                  df = fetch_fmp_1min(sym, start_date, end_date)
                  if df is not None and not df.empty:
                      source = "fmp"
              if (df is None or df.empty) and POLY_KEY:
                  time.sleep(13)  # respect Polygon 5/min
                  df = fetch_poly_1min(sym, start_date, end_date)
                  if df is not None and not df.empty:
                      source = "polygon"

              if df is None or df.empty:
                  print(f"  → NO DATA")
                  continue

              # Filter to actual holding window (inclusive)
              try:
                  df["date"] = pd.to_datetime(df["date"], utc=True)
              except Exception:
                  df["date"] = pd.to_datetime(df["date"]).dt.tz_localize("UTC")
              mask = (df["date"] >= entry_dt) & (df["date"] <= exit_dt)
              hold = df[mask]
              if hold.empty:
                  # Sometimes FMP returns broader window; fall back to full df
                  hold = df

              peak_idx = hold["high"].idxmax()
              peak_price = float(hold.loc[peak_idx, "high"])
              peak_time = hold.loc[peak_idx, "date"]

              peak_gain_pct = ((peak_price / c["entry_price"]) - 1) * 100
              giveback_pct = peak_gain_pct - c["gain_pct"]
              giveback_dol = c["qty"] * (peak_price - c["exit_price"])
              peak_could_have = c["qty"] * (peak_price - c["entry_price"])

              hours_from_entry_to_peak = (peak_time.to_pydatetime() - entry_dt).total_seconds() / 3600
              hours_from_peak_to_exit = (exit_dt - peak_time.to_pydatetime()).total_seconds() / 3600

              row = {
                  "sym": sym,
                  "source": source,
                  "entry_time": c["entry_time"],
                  "exit_time": c["exit_time"],
                  "entry_price": round(c["entry_price"], 4),
                  "exit_price": round(c["exit_price"], 4),
                  "peak_price": round(peak_price, 4),
                  "peak_time": peak_time.isoformat(),
                  "gain_pct": round(c["gain_pct"], 3),
                  "peak_gain_pct": round(peak_gain_pct, 3),
                  "giveback_pct": round(giveback_pct, 3),
                  "qty": c["qty"],
                  "realized_pnl": round(c["rpnl"], 2),
                  "peak_could_have_pnl": round(peak_could_have, 2),
                  "giveback_dollars": round(giveback_dol, 2),
                  "hours_entry_to_peak": round(hours_from_entry_to_peak, 2),
                  "hours_peak_to_exit": round(hours_from_peak_to_exit, 2),
              }
              rows.append(row)
              print(f"  peak ${peak_price:.2f} @ +{peak_gain_pct:+.2f}% ({hours_from_entry_to_peak:.1f}h in) → giveback {giveback_pct:.2f}% (${giveback_dol:+.2f})")

              # Rate-limit: 250 calls/day FMP → be conservative
              time.sleep(2)

          out_df = pd.DataFrame(rows)
          out_df.to_csv("/tmp/intraday_analysis.csv", index=False)
          print()
          print("=" * 60)
          print(f"Analyzed: {len(rows)} trades")
          if rows:
              print(f"Total realized: ${sum(r['realized_pnl'] for r in rows):+.2f}")
              print(f"Total peak-could-have: ${sum(r['peak_could_have_pnl'] for r in rows):+.2f}")
              print(f"Total giveback from peak: ${sum(r['giveback_dollars'] for r in rows):+.2f}")
          PYEOF
          python /tmp/fetch_intraday.py

      - name: Upload analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: intraday-giveback-analysis
          path: /tmp/intraday_analysis.csv
          retention-days: 30
